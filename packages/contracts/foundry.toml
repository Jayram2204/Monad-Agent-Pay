[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.23"
optimizer = true
optimizer_runs = 1000000
via_ir = true
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/"
]

# Monad Testnet Configuration
[rpc_endpoints]
monad_testnet = "https://testnet.monad.xyz"

[etherscan]
monad_testnet = { key = "${MONAD_EXPLORER_API_KEY}", url = "https://explorer.testnet.monad.xyz/api" }

# Gas optimizations for Monad parallel execution
[profile.default.optimizer_details]
peephole = true
inliner = true
jumpdestRemover = true
orderLiterals = true
deduplicate = true
cse = true
constantOptimizer = true
yul = true

[profile.default.optimizer_details.yulDetails]
stackAllocation = true
optimizerSteps = "dhfoDgvulfnTUtnIf"
